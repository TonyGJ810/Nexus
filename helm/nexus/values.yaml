# Valores por defecto para Nexus en Kubernetes (Minikube, Kind, etc.)

replicaCount: 1

image:
  repository: nexus
  tag: local
  # Minikube con imagen local: Never. Con GHCR u otro registry: IfNotPresent o Always
  pullPolicy: IfNotPresent

# Opcional: si la imagen está en GHCR privado, crea un secret y listalo aquí.
# kubectl create secret docker-registry ghcr-login --docker-server=ghcr.io ...
imagePullSecrets: []

# NEXT_PUBLIC_* y, para SSR en K8s sin depender solo del build, SUPABASE_URL / SUPABASE_ANON_KEY
# (mismos valores que en .env / values-local). Ver nexus/lib/supabase/server.ts.
env:
  NEXT_PUBLIC_SUPABASE_URL: ""
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
  SUPABASE_URL: ""
  SUPABASE_ANON_KEY: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: nexus.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
