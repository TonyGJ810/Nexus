apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus.fullname" . }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nexus
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- if .Values.env }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- end }}
          {{- if eq (.Values.probes.type | default "http") "tcp" }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.livenessInitialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.probes.livenessPeriodSeconds | default 20 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.readinessInitialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.probes.readinessPeriodSeconds | default 10 }}
          {{- else }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.httpPath | default "/api/health" }}
              port: http
            initialDelaySeconds: {{ .Values.probes.livenessInitialDelaySeconds | default 20 }}
            periodSeconds: {{ .Values.probes.livenessPeriodSeconds | default 20 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.httpPath | default "/api/health" }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readinessInitialDelaySeconds | default 15 }}
            periodSeconds: {{ .Values.probes.readinessPeriodSeconds | default 10 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
